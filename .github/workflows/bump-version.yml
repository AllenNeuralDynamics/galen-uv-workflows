name: Version Bump

on:
  workflow_call:
    inputs:
      default-branch:
        description: "Branch to bump (usually 'main')"
        required: false
        type: string
        default: "main"
    secrets:
      repo-token:
        description: "Token with write permission to push"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.default-branch }}
          fetch-depth: 0
          token: ${{ secrets.repo-token }}
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
      # Run commitizen as a regular shell step instead of via the
      # commitizen-tools/commitizen-action Docker container action. The
      # container action created files owned by root, requiring chown
      # workarounds in subsequent shell steps. Running cz directly under uv
      # keeps everything as the runner user, faster (no image pull), and
      # makes the actual commands visible in the workflow file.
      - name: Configure git identity
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Commitizen bump (no push)
        id: cz
        shell: bash
        run: |
          set -euo pipefail
          uv tool install commitizen
          PRE=$(uv tool run cz version --project)
          LOG=$(mktemp)
          # cz bump exits non-zero when there are no commits to bump; tolerate
          # that specific case (the bump-call workflow can fire on commits
          # that aren't bump-eligible) and propagate any other failure.
          if ! uv tool run cz bump --yes >"$LOG" 2>&1; then
            if grep -qE "NoCommitsFound|NothingToBump|NoNewCommitsToBump" "$LOG"; then
              cat "$LOG"
              echo "::notice::No bump-eligible commits since last release; skipping."
            else
              cat "$LOG"
              exit 1
            fi
          else
            cat "$LOG"
          fi
          POST=$(uv tool run cz version --project)
          if [[ "$PRE" != "$POST" ]]; then
            echo "version=$POST" >>"$GITHUB_OUTPUT"
          fi
      # Commitizen updates `pyproject.toml`'s `version` but doesn't regenerate
      # `uv.lock`, which embeds the root project's version. The stale lockfile
      # is rejected by `uv sync --locked` downstream (e.g. in a release
      # workflow), so amend the bump commit to include an up-to-date lockfile
      # before pushing.
      - name: Sync uv.lock into the bump commit if present
        if: ${{ steps.cz.outputs.version != '' && hashFiles('uv.lock') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock is already consistent with the bumped pyproject.toml"
          else
            echo "uv.lock drifted after bump; amending bump commit to include it"
            git add uv.lock
            git commit --amend --no-edit
            git tag -f "v${{ steps.cz.outputs.version }}"
          fi
      - name: Push bump commit and tag
        if: steps.cz.outputs.version != ''
        run: |
          git push origin HEAD:${{ inputs.default-branch }}
          git push origin "v${{ steps.cz.outputs.version }}"
      - name: Show new version
        if: steps.cz.outputs.version != ''
        run: echo "Bumped to ${{ steps.cz.outputs.version }}"
