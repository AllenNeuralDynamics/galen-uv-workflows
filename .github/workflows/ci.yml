name: CI

on:
  workflow_call:
    inputs:
      os:
        description: Runner OS
        required: true
        type: string
      python-version:
        description: Python version
        required: true
        type: string
      package-name:
        description: "The Python package name to test/cover"
        required: true
        type: string
      smoke-extras:
        description: |
          Comma-separated extras to install before the wheel smoke test
          (e.g. ``"all"`` or ``"gpu,viz"``). Default is empty: install the
          minimal wheel and walk-import every submodule. Use this only when
          submodules genuinely require an extra to import at module
          top-level; otherwise prefer lazy-importing the extra inside the
          consumers that need it, so the minimal install passes the smoke
          test.
        required: false
        type: string
        default: ""
      smoke-test-paths:
        description: |
          Deprecated and ignored. The smoke job no longer copies caller
          paths or runs pytest; it walks every submodule of the installed
          wheel and tries to import each. Drop this input from your
          ``ci-call.yml``; it will be removed in the next major bump.
        required: false
        type: string
        default: ""
      run-mypy:
        description: "Whether to run mypy for typing checks (true/false)"
        required: false
        type: boolean
        default: false
      skip-package:
        description: |
          Skip the wheel-build + smoke-test job. Use for projects that
          are not Python packages (e.g. Code Ocean capsules, where the
          ``pyproject.toml`` has no ``[build-system]`` and ``uv build``
          has nothing to build).
        required: false
        type: boolean
        default: false
    secrets:
      repo-token:
        description: |
          GitHub token used to authenticate ``uv sync`` when the
          caller's ``pyproject.toml`` pins dependencies via internal
          or private git URLs. If provided, the token is installed as
          a ``url.insteadOf`` git credential before ``uv sync`` runs.
          Omit for callers whose git dependencies are all public.
        required: false

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Configure git for internal deps
        # If the caller passed a repo-token, install it as a global
        # git credential so ``uv sync`` can clone internal or private
        # git dependencies pinned in ``[tool.uv.sources]``. No-op when
        # the secret is empty (all-public-dep callers).
        env:
          GH_TOKEN: ${{ secrets.repo-token }}
        run: |
          if [[ -n "${GH_TOKEN}" ]]; then
            git config --global \
              url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
              "https://github.com/"
          fi
      - name: Install project
        run: uv sync --locked
      - name: Ruff format-check
        run: uv run --frozen ruff format --check --diff .
      - name: Ruff check
        run: uv run --frozen ruff check --output-format=github .

  quality:
    name: Quality (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Configure git for internal deps
        # If the caller passed a repo-token, install it as a global
        # git credential so ``uv sync`` can clone internal or private
        # git dependencies pinned in ``[tool.uv.sources]``. No-op when
        # the secret is empty (all-public-dep callers).
        env:
          GH_TOKEN: ${{ secrets.repo-token }}
        run: |
          if [[ -n "${GH_TOKEN}" ]]; then
            git config --global \
              url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
              "https://github.com/"
          fi
      - name: Install project
        run: uv sync --locked
      - name: Interrogate (docstring coverage)
        run: uv run --frozen interrogate -v
      - name: Codespell (typo checker)
        run: uv run --frozen codespell --check-filenames

  type:
    name: Type (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    if: ${{ inputs.run-mypy }}
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Configure git for internal deps
        # If the caller passed a repo-token, install it as a global
        # git credential so ``uv sync`` can clone internal or private
        # git dependencies pinned in ``[tool.uv.sources]``. No-op when
        # the secret is empty (all-public-dep callers).
        env:
          GH_TOKEN: ${{ secrets.repo-token }}
        run: |
          if [[ -n "${GH_TOKEN}" ]]; then
            git config --global \
              url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
              "https://github.com/"
          fi
      - name: Install project
        run: uv sync --locked
      - name: Mypy
        run: uv run --frozen mypy

  test:
    name: Test (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Configure git for internal deps
        # If the caller passed a repo-token, install it as a global
        # git credential so ``uv sync`` can clone internal or private
        # git dependencies pinned in ``[tool.uv.sources]``. No-op when
        # the secret is empty (all-public-dep callers).
        env:
          GH_TOKEN: ${{ secrets.repo-token }}
        run: |
          if [[ -n "${GH_TOKEN}" ]]; then
            git config --global \
              url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
              "https://github.com/"
          fi
      - name: Install project
        run: uv sync --locked
      - name: Pytest
        run: uv run --frozen pytest --cov ${{ inputs.package-name }}

  package:
    name: Package (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    if: ${{ !inputs.skip-package }}
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Configure git for internal deps
        # If the caller passed a repo-token, install it as a global
        # git credential so ``uv sync`` can clone internal or private
        # git dependencies pinned in ``[tool.uv.sources]``. No-op when
        # the secret is empty (all-public-dep callers).
        env:
          GH_TOKEN: ${{ secrets.repo-token }}
        run: |
          if [[ -n "${GH_TOKEN}" ]]; then
            git config --global \
              url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf \
              "https://github.com/"
          fi
      - name: Install project
        run: uv sync --locked
      - name: Build wheel
        run: uv build --wheel
      - name: Smoke-test built wheel
        shell: bash
        env:
          PACKAGE_NAME: ${{ inputs.package-name }}
          SMOKE_EXTRAS: ${{ inputs.smoke-extras }}
        run: |
          TEMP_DIR="${{ runner.temp }}/wheeltest"
          mkdir -p "$TEMP_DIR"
          cp dist/*.whl "$TEMP_DIR/"
          cd "$TEMP_DIR"

          uv venv .venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PY=".venv/Scripts/python.exe"
          else
            PY=".venv/bin/python"
          fi

          wheel="$(ls *.whl)"
          if [[ -n "$SMOKE_EXTRAS" ]]; then
            uv pip install --python "$PY" "${wheel}[${SMOKE_EXTRAS}]"
          else
            uv pip install --python "$PY" "$wheel"
          fi

          # Walk every submodule of the installed package and try to import
          # it. Catches packaging bugs that only surface against the wheel:
          # missing modules in `[tool.hatch.build.targets.wheel].packages`,
          # missing package-data, and top-level imports of optional extras
          # that aren't installed (those should be lazy-loaded inside the
          # function that needs them).
          "$PY" - <<'PY_SCRIPT'
          import importlib
          import os
          import pkgutil
          import sys

          pkg_name = os.environ["PACKAGE_NAME"]
          pkg = importlib.import_module(pkg_name)
          if not hasattr(pkg, "__path__"):
              print(f"OK: imported single-module package {pkg_name!r}")
              sys.exit(0)

          failures = []
          imported = 1  # the top-level package
          for _, name, _ in pkgutil.walk_packages(pkg.__path__, prefix=pkg.__name__ + "."):
              try:
                  importlib.import_module(name)
                  imported += 1
              except Exception as exc:
                  failures.append((name, type(exc).__name__, str(exc)))

          if failures:
              total = imported + len(failures)
              print(f"FAIL: {len(failures)} of {total} modules failed to import:", file=sys.stderr)
              for name, etype, msg in failures:
                  print(f"  {name}: {etype}: {msg}", file=sys.stderr)
              sys.exit(1)

          print(f"OK: imported {pkg_name!r} and {imported - 1} submodules")
          PY_SCRIPT

  tests:
    # Aggregator job. Name deliberately matches the pre-v2.4 monolith
    # (`Python X on Y`) so downstream branch-protection required-status-check
    # entries from v2.3.x keep matching; sub-jobs (Lint/Quality/Type/Test/
    # Package) provide the finer-grained view in the PR UI.
    name: Python ${{ inputs.python-version }} on ${{ inputs.os }}
    needs: [lint, quality, type, test, package]
    if: always()
    runs-on: ${{ inputs.os }}
    steps:
      - name: Verify all required jobs succeeded
        shell: bash
        run: |
          results='${{ toJson(needs) }}'
          echo "$results"
          # Fail if any required job failed or was cancelled.
          # `skipped` is acceptable (e.g. `type` when run-mypy is false).
          if echo "$results" | grep -qE '"result":[[:space:]]*"(failure|cancelled)"'; then
            exit 1
          fi
