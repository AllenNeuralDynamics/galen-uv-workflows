name: CI

on:
  workflow_call:
    inputs:
      os:
        description: Runner OS
        required: true
        type: string
      python-version:
        description: Python version
        required: true
        type: string
      package-name:
        description: "The Python package name to test/cover"
        required: true
        type: string
      smoke-test-paths:
        description: |
          space-separated list of files or directories
          to copy into the wheel smoke test.
        required: false
        type: string
        default: "tests"
      run-mypy:
        description: "Whether to run mypy for typing checks (true/false)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Install project
        run: uv sync --locked
      - name: Ruff format-check
        run: uv run --frozen ruff format --check --diff .
      - name: Ruff check
        run: uv run --frozen ruff check --output-format=github .

  quality:
    name: Quality (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Install project
        run: uv sync --locked
      - name: Interrogate (docstring coverage)
        run: uv run --frozen interrogate -v
      - name: Codespell (typo checker)
        run: uv run --frozen codespell --check-filenames

  type:
    name: Type (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    if: ${{ inputs.run-mypy }}
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Install project
        run: uv sync --locked
      - name: Mypy
        run: uv run --frozen mypy

  test:
    name: Test (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Install project
        run: uv sync --locked
      - name: Pytest
        run: uv run --frozen pytest --cov ${{ inputs.package-name }}

  package:
    name: Package (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ inputs.python-version }}
          enable-cache: true
      - name: Install project
        run: uv sync --locked
      - name: Build wheel
        run: uv build --wheel
      - name: Smoke-test built wheel
        shell: bash
        run: |
          TEMP_DIR="${{ runner.temp }}/wheeltest"
          mkdir -p "$TEMP_DIR"
          for path in ${{ inputs.smoke-test-paths }}; do
            cp -r "$path" "$TEMP_DIR/" || echo "Warning: '$path' not found"
          done
          cp dist/*.whl "$TEMP_DIR/"
          cd "$TEMP_DIR"

          uv venv .venv

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            PY=".venv/Scripts/python.exe"
          else
            PY=".venv/bin/python"
          fi

          uv pip install --python "$PY" pytest *.whl
          "$PY" -m pytest -q

  tests:
    name: Tests (Py ${{ inputs.python-version }} on ${{ inputs.os }})
    needs: [lint, quality, type, test, package]
    if: always()
    runs-on: ${{ inputs.os }}
    steps:
      - name: Verify all required jobs succeeded
        shell: bash
        run: |
          results='${{ toJson(needs) }}'
          echo "$results"
          # Fail if any required job failed or was cancelled.
          # `skipped` is acceptable (e.g. `type` when run-mypy is false).
          if echo "$results" | grep -qE '"result":[[:space:]]*"(failure|cancelled)"'; then
            exit 1
          fi
